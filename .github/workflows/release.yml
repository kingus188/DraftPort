name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish assets to during manual runs.
        required: false
        default: ''
      platform:
        description: Platform to build during manual runs.
        required: false
        default: all
        type: choice
        options:
          - all
          - macos-latest
          - windows-2022
          - ubuntu-latest

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - windows-2022
          - ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == matrix.platform }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # The web frontend is built by tauri.conf.json beforeBuildCommand.
      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/tauri/src-tauri
          tagName: ${{ inputs.release_tag || github.ref_name }}
          releaseName: WeMD ${{ inputs.release_tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
